<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lufthansa Cargo Fleet Optimization Pro - V1.4</title>
    
    <style>
        :root {

        body { margin: 0; background-color: var(--lh-light); color: var(--lh-text); min-height: 100vh; display: flex; flex-direction: column; overflow-x: hidden; }

        .logo-group { display: flex; align-items: center; gap: 15px; }

        .panel.active { display: block; }
        
        .section-title { font-size: 18px; color: var(--lh-navy); margin-top: 0; margin-bottom: 5px; text-transform: uppercase; border-left: 4px solid var(--lh-yellow); padding-left: 10px; font-weight: 900; }

        .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; }
        
        label { font-weight: 800; font-size: 11px; text-transform: uppercase; color: var(--lh-navy); margin-bottom: 8px; display: block; }
        textarea, select, input[type="number"], input[type="text"] { width: 100%; padding: 12px; border: 1px solid var(--lh-border); border-radius: 6px; font-size: 14px; outline: none; transition: 0.2s; background: #f9fafb; }

        .btn-outline:hover { border-color: var(--lh-yellow); background: #fffdf5; }

        .row-header { font-size: 10px; font-weight: 900; color: #6b7280; text-transform: uppercase; text-align: center; }

        .badge-warn { background: #f59e0b; color: white; }
