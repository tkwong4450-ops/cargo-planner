<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lufthansa Cargo Flight Planner</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        :root { --lh-navy: #001b44; --lh-yellow: #ffaa00; --lh-light: #f4f5f7; }
        body { margin: 0; background-color: var(--lh-light); font-family: sans-serif; display: flex; flex-direction: column; min-height: 100vh; }
        header { background: var(--lh-navy); border-bottom: 4px solid var(--lh-yellow); padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; color: white; }
        .panel { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 1000px; margin: 20px auto; display: none; }
        .panel.active { display: block; }
        .row-grid { display: grid; grid-template-columns: 80px 100px 100px 100px 120px 50px; gap: 10px; margin-bottom: 10px; }
        input { padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        button { cursor: pointer; padding: 10px; background: var(--lh-navy); color: white; border: none; border-radius: 4px; font-weight: bold; }
        .btn-add { background: var(--lh-yellow); color: var(--lh-navy); margin-top: 10px; }
    </style>
</head>
<body>

<header>
    <div style="font-weight:900; font-size:20px;">Lufthansa Cargo | Flight Planner</div>
    <div id="stepInfo">Step 1: Manifest</div>
</header>

<main>
    <div class="panel active" id="stage1">
        <h3>Step 1: Manifest & Weights</h3>
        <textarea id="emailInput" rows="6" style="width:100%;" placeholder="Paste email here: '20 plts 6400kg 27.21cbm. Size 120*80*142cm/20'"></textarea>
        <button onclick="parseEmail()" style="margin-top:10px;">⚡ Parse Shipment Text</button>
        
        <div id="cargoRows" style="margin-top:20px;"></div>
        <button class="btn-add" onclick="addRow(1, '', '', '', '')">+ Add Manual Row</button>
        
        <div style="margin-top:20px; font-weight:bold;" id="manifestSummary">Total: 0 Pcs | 0 kg</div>
        <button onclick="goToStage(2)" style="float:right;">Next: ULD Config →</button>
    </div>

    <div class="panel" id="stage2">
        <h3>Step 2: Fleet & Contour</h3>
        <select id="baseSelect"><option value="PMC">PMC Pallet</option><option value="PZA">PZA Pallet</option></select>
        <button onclick="goToStage(1)">← Back</button>
        <button onclick="goToStage(3)">Next: 3D Map →</button>
    </div>

    <div class="panel" id="stage3">
        <h3>Step 3: 3D Map</h3>
        <div id="canvasContainer" style="height:400px; background:#000;"></div>
        <button onclick="goToStage(2)">← Back</button>
    </div>
</main>

<script>
    function addRow(q, l, w, h, wgt) {
        const container = document.getElementById('cargoRows');
        const id = 'row_' + Date.now();
        const html = `<div class="row-grid" id="${id}">
            <input type="number" class="qty" value="${q}">
            <input type="number" class="length" value="${l}">
            <input type="number" class="width" value="${w}">
            <input type="number" class="height" value="${h}">
            <input type="number" class="weight" value="${wgt}">
            <button onclick="document.getElementById('${id}').remove(); updateSummary();">X</button>
        </div>`;
        container.insertAdjacentHTML('beforeend', html);
        updateSummary();
    }

    function updateSummary() {
        let pcs = 0, wgt = 0;
        document.querySelectorAll('.row-grid').forEach(r => {
            pcs += parseInt(r.querySelector('.qty').value) || 0;
            wgt += (parseInt(r.querySelector('.qty').value) || 0) * (parseFloat(r.querySelector('.weight').value) || 0);
        });
        document.getElementById('manifestSummary').innerText = `Total: ${pcs} Pcs | ${wgt.toFixed(1)} kg`;
    }

    function parseEmail() {
        const text = document.getElementById('emailInput').value;
        document.getElementById('cargoRows').innerHTML = '';
        
        // Advanced Parser:
        // 1. Matches qty (e.g., "20 plts")
        // 2. Matches dimensions (e.g., "120*80*142cm")
        // 3. Matches weight (e.g., "6400kg")
        const regex = /(\d+)\s*(?:plts|pallets|ctns|cartons|pcs|units)/gi;
        const dimRegex = /(\d+(?:\.\d+)?)\s*[xX*×]\s*(\d+(?:\.\d+)?)\s*[xX*×]\s*(\d+(?:\.\d+)?)/;
        const wgtRegex = /(\d+)\s*(?:kg|kgs)/i;

        const lines = text.split(/[.\n]/);
        lines.forEach(line => {
            let qM = line.match(regex);
            let dM = line.match(dimRegex);
            let wM = line.match(wgtRegex);

            if(dM) {
                let qty = qM ? parseInt(qM[0]) : 1;
                let l=dM[1], w=dM[2], h=dM[3];
                let wgt = wM ? parseInt(wM[1]) / qty : 0; // Avg weight
                addRow(qty, l, w, h, wgt);
            }
        });
        updateSummary();
    }

    function goToStage(num) {
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        document.getElementById('stage' + num).classList.add('active');
    }
</script>
</body>
</html>
