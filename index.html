<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lufthansa Cargo Multi-Step ULD Builder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex flex-col font-sans antialiased">

    <header class="bg-slate-900 border-b border-slate-800 p-4 shadow-xl">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <div>
                <h1 class="text-xl font-black text-amber-400 tracking-wide">LH Flight Load Planning Tool</h1>
                <p class="text-xs text-slate-400 font-medium font-mono">Multi-Stage Volumetric Optimizer</p>
            </div>
            <div class="flex items-center space-x-2 text-xs font-bold font-mono">
                <span id="stepBadge1" class="px-2 py-1 bg-amber-500 text-slate-950 rounded">1. CARGO</span>
                <span class="text-slate-600">→</span>
                <span id="stepBadge2" class="px-2 py-1 bg-slate-800 text-slate-400 rounded">2. ULD SELECT</span>
                <span class="text-slate-600">→</span>
                <span id="stepBadge3" class="px-2 py-1 bg-slate-800 text-slate-400 rounded">3. 3D MAP</span>
            </div>
        </div>
    </header>

    <main class="flex-1 max-w-6xl w-full mx-auto p-4 flex flex-col justify-center items-center">
        
        <div id="panelStage1" class="w-full max-w-2xl bg-slate-900 border border-slate-800 rounded-xl p-6 shadow-2xl space-y-6">
            <div>
                <h2 class="text-lg font-black text-amber-400 uppercase tracking-wider">📦 Step 1: Input Shipment Specifications</h2>
                <p class="text-xs text-slate-400">Enter package quantities and exact physical dimensions (cm) below.</p>
            </div>

            <div class="space-y-3">
                <div class="grid grid-cols-12 gap-2 text-center text-[10px] font-bold text-slate-500 uppercase tracking-wider px-1">
                    <div class="col-span-2">Qty (Pcs)</div>
                    <div class="col-span-3">Length (cm)</div>
                    <div class="col-span-3">Width (cm)</div>
                    <div class="col-span-3">Height (cm)</div>
                    <div class="col-span-1"></div>
                </div>
                <div id="cargoRowsContainer" class="space-y-2.5 max-h-64 overflow-y-auto pr-1"></div>
                
                <button onclick="addManualRow()" class="text-xs text-amber-400 font-bold bg-slate-950 border border-slate-800 hover:bg-slate-800 transition px-3 py-1.5 rounded shadow-sm">
                    + Add New Package Line
                </button>
            </div>

            <div class="border-t border-slate-800 pt-4 flex justify-end">
                <button onclick="goToStage2()" class="bg-amber-500 hover:bg-amber-400 text-slate-950 font-black px-6 py-2.5 rounded-lg shadow-lg transition text-xs uppercase tracking-wider">
                    Proceed to ULD Matching →
                </button>
            </div>
        </div>

        <div id="panelStage2" class="w-full max-w-2xl bg-slate-900 border border-slate-800 rounded-xl p-6 shadow-2xl
