<script>
    // 1. Corrected Geometry Definitions
    const CONTOURS = {
        Contour_J1: { maxHeight: 244, type: "main-deck-asymmetric", slopeStartH: 150, taperOffset: 60 },
        Contour_J4: { maxHeight: 300, type: "symmetric-taper", taperOffset: 120 }, 
        Contour_H: { maxHeight: 114, type: "symmetric-belly", taperOffset: 30, bellyHeight: 50 },
        Contour_AKE: { maxHeight: 163, type: "half-belly", overhang: 45, bellyHeight: 60 }
    };

    // 2. The New Slope-Aware Audit Logic
    function checkTaperIntersection(mesh, contour) {
        let box = new THREE.Box3().setFromObject(mesh);
        
        // Simple logic for breach detection
        if (contour.type === "symmetric-taper") {
            // Check if corners extend beyond the calculated taper
            // Taper reduces width by 'taperOffset' over 'maxHeight'
            let allowedW = 244 - ((box.max.y / contour.maxHeight) * contour.taperOffset);
            if (box.max.x > allowedW/2 || box.min.x < -allowedW/2) return true;
        }
        
        if (contour.type === "main-deck-asymmetric") {
             // Inboard (Positive X) is straight, Outboard (Negative X) tapers
             if (box.max.x > 122) return true; // Inboard wall
             if (box.min.x < -122 + ((box.max.y/contour.maxHeight) * contour.taperOffset)) return true; // Outboard wall
        }
        
        return false;
    }

    // 3. Updated Audit to use the Intersection Check
    function runWeightAudit() {
        const contour = CONTOURS[document.getElementById('contourSelect').value];
        const manifest = updateManifestSummary();
        let breach = false;

        cargoGroup.children.forEach(m => {
            if (checkTaperIntersection(m, contour)) breach = true;
        });

        const badge = document.getElementById('weightBadge');
        if (breach) {
            badge.className = "status-badge badge-fail";
            badge.innerText = "ENVELOPE BREACH";
        } else if (manifest.weight > (base.maxWeight * parseInt(document.getElementById('uldQtyInput').value))) {
            badge.className = "status-badge badge-warn";
            badge.innerText = "OVERWEIGHT";
        } else {
            badge.className = "status-badge badge-ok";
            badge.innerText = "CAPACITY OK";
        }
    }

    // 4. Corrected Drawing Logic for J4 and H
    function drawSharpEnvelope(b, c, offsetX) {
        const hW = b.width/2; 
        const shape = new THREE.Shape();
        
        if (c.type === "symmetric-taper") {
            // J4: Taper on both sides
            shape.moveTo(-hW, 0); 
            shape.lineTo(-hW + c.taperOffset, c.maxHeight); 
            shape.lineTo(hW - c.taperOffset, c.maxHeight); 
            shape.lineTo(hW, 0); 
            shape.lineTo(-hW, 0);
        } else if (c.type === "symmetric-belly") {
            // AKH: Taper on both sides + belly curve
            shape.moveTo(-hW, 0);
            shape.lineTo(-hW + c.taperOffset, c.bellyHeight);
            shape.lineTo(-hW + c.taperOffset, c.maxHeight);
            shape.lineTo(hW - c.taperOffset, c.maxHeight);
            shape.lineTo(hW - c.taperOffset, c.bellyHeight);
            shape.lineTo(hW, 0);
            shape.lineTo(-hW, 0);
        } else if (c.type === "main-deck-asymmetric") {
            // J1: Straight inboard (Right), Tapered Outboard (Left)
            shape.moveTo(-hW, 0); 
            shape.lineTo(-hW, 150); 
            shape.lineTo(-hW + c.taperOffset, c.maxHeight); 
            shape.lineTo(hW, c.maxHeight);           
            shape.lineTo(hW, 0);                     
            shape.lineTo(-hW, 0);
        }
        // ... (Rest of extrude logic)
    }
</script>
